services:
  gateway:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=info
      # Set GATEWAY_API_KEY to enable auth: - GATEWAY_API_KEY=your-secret-key
      # Set GATEWAY_FERNET_KEY for session persistence: - GATEWAY_FERNET_KEY=your-fernet-key
    restart: unless-stopped
    profiles:
      - static
      - dynamic
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 5s
      retries: 3

  emulator:
    image: budtmo/docker-android:emulator_12.0
    privileged: true
    ports:
      - "5554:5554"
      - "5555:5555"
    environment:
      - EMULATOR_DEVICE=pixel_4
      - WEB_VNC=true
    devices:
      - /dev/kvm
    profiles:
      - dynamic
    depends_on:
      - gateway

volumes:
  output:
  data:
